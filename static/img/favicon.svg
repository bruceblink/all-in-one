<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="32" rx="8" fill="url(#shine)"/>

  <!-- Letter "L" — vertical bar -->
  <rect x="8" y="7" width="5" height="16" rx="2.5" fill="white" fill-opacity="0.95"/>

  <!-- Letter "L" — horizontal bar -->
  <rect x="8" y="18" width="15" height="5" rx="2.5" fill="white" fill-opacity="0.95"/>

  <!-- Accent dot -->
  <circle cx="24" cy="8" r="2" fill="white" fill-opacity="0.4"/>
</svg>
