<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="40" height="40" rx="10" fill="url(#shine)"/>

  <!-- Letter "L" — vertical bar -->
  <rect x="11" y="9" width="6" height="20" rx="3" fill="white" fill-opacity="0.95"/>

  <!-- Letter "L" — horizontal bar -->
  <rect x="11" y="23" width="18" height="6" rx="3" fill="white" fill-opacity="0.95"/>

  <!-- Small accent dot — top right corner, adds personality -->
  <circle cx="30" cy="10" r="2.5" fill="white" fill-opacity="0.4"/>
</svg>
